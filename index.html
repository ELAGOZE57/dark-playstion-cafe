<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark PlayStation Cafe</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #00a8ff;
            font-size: 2.5em;
            margin-bottom: 30px;
        }
        
        .menu-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #00a8ff;
        }
        
        .menu-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            border: 3px solid #00a8ff;
            margin: 20px 0;
        }
        
        .info {
            color: #00a8ff;
            margin: 15px 0;
            padding: 10px;
            background: #00a8ff10;
            border-radius: 10px;
        }
        
        .button {
            display: inline-block;
            background: #00a8ff;
            color: black;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px;
            border: 2px solid #00a8ff;
        }
        
        .address {
            color: #888;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        @media (max-width: 500px) {
            h1 { font-size: 1.8em; }
            .button { display: block; margin: 10px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 DARK PLAYSTATION CAFE 🎮</h1>
        
        <div class="menu-box">
            <h2 style="color: #00a8ff;">📋 قائمة الطعام</h2>
            
            <!-- صورة المنيو - تم تعديل المسار -->
            <img src="images/menu.jpg" 
                 alt="المنيو" 
                 class="menu-image"
                 onclick="window.open('https://wa.me/201032393132', '_blank')">
            
            <div class="info">
                ⭐ جلسات خاصة ⭐ أحدث الألعاب ⭐ مشروبات ساخنة وباردة
            </div>
            
            <!-- زر الواتساب -->
            <a href="https://wa.me/201032393132" 
               class="button" 
               target="_blank">
                📞 احجز عبر واتساب
            </a>
        </div>
        
        <!-- العنوان -->
        <div class="address">
            📍 شارع التحرير امام فيلا احمد ضيف الله بجوار حى شرق<br>
            📱 واتساب: 01032393132<br>
            ⏰ 12:00 ظهراً - 2:00 صباحاً
        </div>
    </div>
</body>
</html>
