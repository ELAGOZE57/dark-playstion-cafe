<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark PlayStation Cafe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            direction: rtl;
        }
        
        .container {
            max-width: 900px;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            color: #00a8ff;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00a8ff;
        }
        
        .cafe-card {
            background: rgba(20, 20, 20, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 168, 255, 0.3);
            border: 2px solid #00a8ff;
        }
        
        .menu-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 20px;
            border: 4px solid #00a8ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
        }
        
        .menu-image:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00a8ff;
        }
        
        .menu-button {
            display: inline-block;
            background: #00a8ff;
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 20px;
            transition: all 0.3s ease;
            border: 2px solid #00a8ff;
        }
        
        .menu-button:hover {
            background: transparent;
            color: #00a8ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #00a8ff;
        }
        
        .price-tag {
            color: #00a8ff;
            font-size: 1.5em;
            margin: 15px 0;
        }
        
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 DARK PLAYSTATION CAFE 🎮</h1>
        
        <div class="cafe-card">
            <h2 style="color: #00a8ff; margin-bottom: 20px;">📋 قائمة الطعام والجلسات</h2>
            
            <!-- صورة المنيو -->
            <img src="images/menu.jpg" 
                 alt="منيو مقهى بلايستيشن" 
                 class="menu-image"
                 onclick="window.open('/menu', '_blank')"
                 title="اضغط مرتين لفتح المنيو">
            
            <div class="price-tag">
                ⭐ جلسات خاصة ⭐ ألعاب حديثة ⭐ مشروبات ساخنة وباردة
            </div>
            
            <!-- زر للذهاب للمنيو -->
            <a href="/full-menu" class="menu-button" target="_blank">
                🍔 عرض المنيو الكامل 🥤
            </a>
        </div>
        
        <div class="footer">
            <p>📍 العنوان: ... | 📞 للتواصل: ...</p>
            <p>⏰ ساعات العمل: 12:00 ظهراً - 2:00 صباحاً</p>
        </div>
    </div>
    
    <script>
        // إضافة تأثير النقر على الصورة
        document.querySelector('.menu-image').addEventListener('dblclick', function() {
            window.open('https://your-full-menu-link.com', '_blank');
        });
    </script>
</body>
</html>
