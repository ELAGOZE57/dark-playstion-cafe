<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING RK | بلايستيشن كافيه</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            color: gold;
            font-size: 3.5em;
            margin-bottom: 5px;
            text-shadow: 0 0 15px gold;
            letter-spacing: 2px;
        }
        
        h2 {
            color: gold;
            font-size: 2em;
            margin-top: 0;
            margin-bottom: 30px;
            opacity: 0.9;
            letter-spacing: 3px;
        }
        
        /* قسم المنيو */
        .menu-section {
            background: #111;
            border: 2px solid gold;
            border-radius: 30px;
            padding: 25px;
            margin: 30px 0;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .menu-title {
            color: gold;
            font-size: 2.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid gold;
            padding-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .menu-title:hover {
            transform: scale(1.1);
            text-shadow: 0 0 20px gold;
        }
        
        .menu-title a {
            color: gold;
            text-decoration: none;
            display: block;
        }
        
        .menu-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .menu-item {
            background: #1a1a1a;
            border: 1px solid gold;
            border-radius: 15px;
            padding: 15px;
            transition: transform 0.3s;
        }
        
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px gold;
        }
        
        .menu-item h3 {
            color: gold;
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        
        .menu-item p {
            color: #ccc;
            font-size: 1em;
            line-height: 1.6;
        }
        
        .phone {
            font-size: 3em;
            color: gold;
            direction: ltr;
            margin: 25px 0;
            letter-spacing: 3px;
            background: #111;
            padding: 15px;
            border-radius: 50px;
            border: 2px solid gold;
        }
        
        .whatsapp-btn {
            display: inline-block;
            background: gold;
            color: black;
            font-size: 1.8em;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            margin: 20px 0;
            border: 2px solid gold;
            transition: all 0.3s;
        }
        
        .whatsapp-btn:hover {
            background: transparent;
            color: gold;
            transform: scale(1.05);
            box-shadow: 0 0 30px gold;
        }
        
        @media (max-width: 500px) {
            h1 { font-size: 2.5em; }
            h2 { font-size: 1.5em; }
            .menu-items { grid-template-columns: 1fr; }
            .phone { font-size: 2em; }
            .whatsapp-btn { font-size: 1.4em; padding: 12px 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PING RK</h1>
        <h2>PLAYSTATION CAFE</h2>
        
        <!-- قسم المنيو -->
        <div class="menu-section">
            <div class="menu-title">
                <a href="https://elagoze57.github.io/dark-playstion-cafe/file.jpg.jpg" target="_blank">
                    المنيو
                </a>
            </div>
            
            <!-- قائمة المنتجات (بدون تفاصيل) -->
            <div class="menu-items">
                <div class="menu-item">
                    <h3>مشروبات باردة</h3>
                </div>
                
                <div class="menu-item">
                    <h3>مشروبات ساخنة</h3>
                </div>
                
                <div class="menu-item">
                    <h3>جلسات بلايستيشن</h3>
                </div>
            </div>
        </div>
        
        <!-- رقم الهاتف -->
        <div class="phone">
            01032393132
        </div>
        
        <!-- زر الواتساب -->
        <a href="https://wa.me/201032393132" 
           class="whatsapp-btn" 
           target="_blank">
            احجز عبر واتساب
        </a>
        
        <!-- الحقوق -->
        <div style="color: #444; margin-top: 30px; font-size: 0.8em;">
            © 2026 PING RK PLAYSTATION CAFE
        </div>
    </div>
</body>
</html>
