<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING RK | بلايستيشن كافيه</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: gold;
            font-size: 3em;
            margin-bottom: 5px;
            text-shadow: 0 0 10px gold;
        }
        
        h2 {
            color: gold;
            font-size: 1.8em;
            margin-top: 0;
            opacity: 0.9;
        }
        
        .menu-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            border: 3px solid gold;
            border-radius: 15px;
            margin: 30px 0;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .menu-image:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }
        
        .menu-text {
            color: gold;
            font-size: 1.2em;
            margin: 10px 0 30px;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .address {
            background: #111;
            border-right: 4px solid gold;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            font-size: 1.2em;
            line-height: 1.8;
        }
        
        .phone {
            font-size: 2.5em;
            color: gold;
            direction: ltr;
            margin: 20px 0;
            letter-spacing: 2px;
        }
        
        .whatsapp-btn {
            display: inline-block;
            background: gold;
            color: black;
            font-size: 1.5em;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            margin: 20px 0;
            border: 2px solid gold;
            transition: all 0.3s;
        }
        
        .whatsapp-btn:hover {
            background: transparent;
            color: gold;
        }
        
        .footer {
            color: #444;
            margin-top: 40px;
            font-size: 0.8em;
        }
        
        @media (max-width: 500px) {
            h1 { font-size: 2.5em; }
            h2 { font-size: 1.5em; }
            .phone { font-size: 2em; }
            .whatsapp-btn { font-size: 1.2em; padding: 12px 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PING RK</h1>
        <h2>PLAYSTATION CAFE</h2>
        
        <!-- صورة المنيو -->
        <img src="menu.jpg" 
             alt="منيو بلايستيشن" 
             class="menu-image"
             onclick="window.open('menu.jpg', '_blank')">
        
        <div class="menu-text">
            👆 اضغط على الصورة لعرض المنيو كاملاً 👆
        </div>
        
        <!-- العنوان -->
        <div class="address">
            📍 شارع التحرير امام فيلا احمد ضيف الله بجوار حي شرق
        </div>
        
        <!-- رقم الهاتف -->
        <div class="phone">
            01032393132
        </div>
        
        <!-- زر الواتساب -->
        <a href="https://wa.me/201032393132" 
           class="whatsapp-btn" 
           target="_blank">
            📱 احجز عبر واتساب
        </a>
        
        <!-- الحقوق -->
        <div class="footer">
            © 2026 PING RK PLAYSTATION CAFE
        </div>
    </div>
</body>
</html>
