<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark PlayStation Cafe</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
            padding: 15px;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00a8ff;
            font-size: 2em;
            margin: 20px 0;
        }
        
        .menu-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #00a8ff;
            margin: 20px 0;
        }
        
        .menu-image {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            border: 3px solid #00a8ff;
            margin: 15px 0;
        }
        
        .info {
            color: #00a8ff;
            padding: 10px;
            background: #00a8ff15;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .whatsapp-btn {
            display: inline-block;
            background: #00a8ff;
            color: black;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            margin: 10px;
            border: 2px solid #00a8ff;
        }
        
        .address {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            color: #ccc;
            line-height: 1.8;
            margin-top: 20px;
        }
        
        .working-hours {
            color: #00a8ff;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 DARK PLAYSTATION CAFE 🎮</h1>
        
        <div class="menu-card">
            <h2 style="color: #00a8ff;">📋 القائمة</h2>
            
            <!-- صورة المنيو - استخدمنا الاسم كما هو menu.jpg.jpg -->
            <img src="images/menu.jpg.jpg" 
                 alt="منيو المقهى" 
                 class="menu-image">
            
            <div class="info">
                ⭐ جلسات خاصة ⭐ أحدث الألعاب ⭐ مشروبات ساخنة وباردة
            </div>
            
            <!-- زر واتساب -->
            <a href="https://wa.me/201032393132" 
               class="whatsapp-btn" 
               target="_blank">
                📞 احجز عبر واتساب
            </a>
        </div>
        
        <!-- العنوان كما طلبت -->
        <div class="address">
            <div style="font-size: 1.2em; color: #00a8ff; margin-bottom: 10px;">📍 العنوان</div>
            شارع التحرير امام فيلا احمد ضيف الله بجوار حى شرق
            <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #333;">
                📱 01032393132
            </div>
            <div class="working-hours">
                ⏰ 12:00 ظهراً - 2:00 صباحاً
            </div>
        </div>
    </div>
</body>
</html>
