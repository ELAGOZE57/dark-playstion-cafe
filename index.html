<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING RK | بلايستيشن كافيه</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            color: gold;
            font-size: 3.5em;
            margin-bottom: 5px;
            text-shadow: 0 0 15px gold;
            letter-spacing: 2px;
        }
        
        h2 {
            color: gold;
            font-size: 2em;
            margin-top: 0;
            margin-bottom: 40px;
            opacity: 0.9;
            letter-spacing: 3px;
        }
        
        .address {
            background: #111;
            border-right: 5px solid gold;
            border-left: 5px solid gold;
            padding: 25px 15px;
            border-radius: 20px;
            margin: 30px 0;
            font-size: 1.3em;
            line-height: 1.8;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .address span {
            color: gold;
            font-size: 1.5em;
            display: block;
            margin-bottom: 10px;
        }
        
        .phone {
            font-size: 3em;
            color: gold;
            direction: ltr;
            margin: 30px 0;
            letter-spacing: 3px;
            text-shadow: 0 0 10px gold;
            background: #111;
            padding: 15px;
            border-radius: 50px;
            border: 1px solid gold;
        }
        
        .whatsapp-btn {
            display: inline-block;
            background: gold;
            color: black;
            font-size: 1.8em;
            font-weight: bold;
            padding: 18px 45px;
            border-radius: 60px;
            text-decoration: none;
            margin: 30px 0 20px;
            border: 2px solid gold;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .whatsapp-btn:hover {
            background: transparent;
            color: gold;
            transform: scale(1.05);
            box-shadow: 0 0 40px gold;
        }
        
        .footer {
            color: #444;
            margin-top: 40px;
            font-size: 0.9em;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        
        /* تنسيق للجوال */
        @media (max-width: 500px) {
            h1 { font-size: 2.5em; }
            h2 { font-size: 1.5em; }
            .phone { font-size: 2.2em; }
            .whatsapp-btn { font-size: 1.4em; padding: 15px 30px; }
            .address { font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PING RK</h1>
        <h2>PLAYSTATION CAFE</h2>
        
        <!-- العنوان مع علامة ❗️ -->
        <div class="address">
            <span>📍 العنوان</span>
            شارع التحرير امام فيلا احمد ضيف الله بجوار حي شرق ❗️
        </div>
        
        <!-- رقم الهاتف -->
        <div class="phone">
            01032393132
        </div>
        
        <!-- زر الواتساب -->
        <a href="https://wa.me/201032393132" 
           class="whatsapp-btn" 
           target="_blank">
            📱 احجز عبر واتساب
        </a>
        
        <!-- الحقوق -->
        <div class="footer">
            © 2026 PING RK PLAYSTATION CAFE
        </div>
    </div>
</body>
</html>
